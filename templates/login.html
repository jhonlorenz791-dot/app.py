<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #21a9e3;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }


    .login-box {
        background: rgb(209, 213, 216);
        padding: 25px;
        border-radius: 10px;
        width: 300px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
        text-align: center;
    }

    input {
        width: 100%;
        padding: 10px;
        margin: 8px 0;
    }

    button {
        width: 100%;
        padding: 10px;
        background-color: #333535;
        color: white;
        border: none;
        cursor: pointer;
    }

    button:hover {
        background-color: #45a049;
    }

    .error {
        color: red;
        text-align: center;
    }
</style>


</head>
<body>

<div class="login-box">
    <h2>Login</h2>


{% if error %}
    <p class="error">{{ error }}</p>
{% endif %}

<form method="POST" action="/login">
    <input type="text" name="username" placeholder="Enter Username" required>
    <input type="password" name="password" placeholder="Enter Password" required>
    <button type="submit">Login</button>
</form>


</div>

</body>
</html>
